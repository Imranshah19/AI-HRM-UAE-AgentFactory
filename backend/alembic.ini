# Alembic Configuration - AI-HRMS
# Usage:
#   alembic revision --autogenerate -m "describe your change"
#   alembic upgrade head
#   alembic downgrade -1
#   alembic history

[alembic]
# Path to the migration scripts
script_location = alembic

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Truncate long slugs in filenames
truncate_slug_length = 40

# Treat all migration files as UTF-8
prepend_sys_path = .

# Output encoding
output_encoding = utf-8

# Database URL
# This is overridden in alembic/env.py to read from the .env file.
# Left here as documentation only.
sqlalchemy.url = postgresql://hrms_user:hrms_password@localhost:5432/hrms_db

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
