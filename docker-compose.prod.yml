version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# AI-HRMS — Production Docker Compose
# ══════════════════════════════════════════════════════════════════════════════
# Usage:
#   docker compose -f docker-compose.prod.yml build      → build all images
#   docker compose -f docker-compose.prod.yml up -d      → start all services
#   docker compose -f docker-compose.prod.yml logs -f    → tail logs
#   docker compose -f docker-compose.prod.yml down        → stop services
#   docker compose -f docker-compose.prod.yml ps          → service status
#
# Prerequisites:
#   - .env file populated from .env.example
#   - SSL certificates in /etc/letsencrypt (managed by certbot on host)
# ══════════════════════════════════════════════════════════════════════════════

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  hrms_internal:
    driver: bridge
    internal: false   # must be false so nginx can reach external; backend/db don't expose ports
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  nginx_certs:
    driver: local
  nginx_www:
    driver: local

# ══════════════════════════════════════════════════════════════════════════════
# Services
# ══════════════════════════════════════════════════════════════════════════════
services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: hrms_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Tuning for production
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    # No external port exposure in production.
    # Uncomment only for emergency remote admin (restrict firewall accordingly):
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    networks:
      - hrms_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          cpus: "0.25"
          memory: 256m
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c log_min_duration_statement=1000
        -c log_checkpoints=on

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hrms_redis_prod
    restart: always
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD}
        --save 900 1
        --save 300 10
        --save 60 10000
    volumes:
      - redis_data:/data
    networks:
      - hrms_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512m
        reservations:
          cpus: "0.1"
          memory: 128m

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: hrms-backend:${APP_VERSION:-latest}
    container_name: hrms_backend_prod
    restart: always
    # 4 uvicorn workers, no --reload in production
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 4
        --worker-class uvicorn.workers.UvicornWorker
        --proxy-headers
        --forwarded-allow-ips="*"
        --access-log
        --log-level info
    environment:
      - APP_ENV=production
      - DEBUG=false
      - APP_VERSION=${APP_VERSION:-1.3.0}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_SYNC_URL=${DATABASE_SYNC_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-30}
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - LOCAL_UPLOAD_DIR=/uploads
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-}
      - AWS_S3_REGION=${AWS_S3_REGION:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-AI-HRMS}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - FIRST_SUPERADMIN_EMAIL=${FIRST_SUPERADMIN_EMAIL}
      - FIRST_SUPERADMIN_PASSWORD=${FIRST_SUPERADMIN_PASSWORD}
      - FIRST_SUPERADMIN_FIRST_NAME=${FIRST_SUPERADMIN_FIRST_NAME}
      - FIRST_SUPERADMIN_LAST_NAME=${FIRST_SUPERADMIN_LAST_NAME}
    volumes:
      - uploads_data:/uploads
    networks:
      - hrms_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.5"
          memory: 512m

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: hrms-backend:${APP_VERSION:-latest}
    container_name: hrms_celery_worker_prod
    restart: always
    command: >
      celery -A app.worker.celery_app worker
        --loglevel=info
        --concurrency=8
        -Q default,payroll,notifications,reports,ai
        --max-tasks-per-child=100
        --time-limit=3600
        --soft-time-limit=3300
    environment:
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_SYNC_URL=${DATABASE_SYNC_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - LOCAL_UPLOAD_DIR=/uploads
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - uploads_data:/uploads
    networks:
      - hrms_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          cpus: "0.25"
          memory: 256m

  # ── Celery Beat (Scheduler) ───────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: hrms-backend:${APP_VERSION:-latest}
    container_name: hrms_celery_beat_prod
    restart: always
    command: >
      celery -A app.worker.celery_app beat
        --loglevel=info
        --scheduler redbeat.RedBeatScheduler
        --pidfile=/tmp/celerybeat.pid
    environment:
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_SYNC_URL=${DATABASE_SYNC_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
    networks:
      - hrms_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid) 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 128m

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: production
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-AI-HRMS}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    image: hrms-frontend:${APP_VERSION:-latest}
    container_name: hrms_frontend_prod
    restart: always
    # Next.js standalone output — runs the standalone server directly
    command: node server.js
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-AI-HRMS}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    networks:
      - hrms_internal
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          cpus: "0.25"
          memory: 256m

  # ── Nginx (Reverse Proxy + SSL Termination) ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hrms_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/letsencrypt:ro
      - nginx_www:/var/www/certbot:ro
      - uploads_data:/var/www/uploads:ro
    networks:
      - hrms_internal
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m
        reservations:
          cpus: "0.1"
          memory: 64m
